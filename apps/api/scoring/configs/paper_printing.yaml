competitor_query_template: >
  Who are the top 3-5 paper, packaging, and printing product exporters currently supplying
  {target_country} packaging companies, publishers, and distributors in 2025?
  Focus on suppliers from Balkans, Eastern Europe (Poland, Czech Republic, Hungary), and Scandinavia.
  For each: product category (kraft paper, corrugated board, printed matter, cork),
  country of origin, approximate wholesale price per tonne or unit,
  certifications held (FSC, PEFC, ISO 9001), and key customers.
  Cite sources.
