competitor_query_template: >
  Who are the top 3-5 civilian firearms and ammunition exporters (hunting rifles, sporting
  pistols, shotguns, ammunition) currently supplying {target_country} licensed firearms
  dealers and distributors in 2025?
  Focus on suppliers from Balkans (especially Bosnia — Sarajevo arms tradition), Austria,
  Czech Republic, Germany, and Turkey.
  For each: product category, country of origin, approximate wholesale price per unit,
  CIP proof status, export control compliance, and key dealer relationships.
  Cite sources.
