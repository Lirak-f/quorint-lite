competitor_query_template: >
  Who are the top 3-5 optical instrument, medical device, and precision measurement equipment
  exporters currently supplying {target_country} hospitals, laboratories, distributors, and
  retailers in 2025?
  Focus on suppliers from Balkans, Eastern Europe (Czech Republic, Poland), Germany, and Switzerland.
  For each: product category, country of origin, approximate price range,
  certifications held (CE MDR/IVDR/MID, ISO 13485, RoHS), and key EU customers.
  Cite sources.
