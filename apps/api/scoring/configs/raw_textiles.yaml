competitor_query_template: >
  Who are the top 3-5 fabric, yarn, and raw textile exporters currently supplying
  {target_country} garment manufacturers, home textile brands, and distributors in 2025?
  Focus on suppliers from Balkans (North Macedonia, Kosovo, Serbia), Turkey, Pakistan, and India
  with EU market presence.
  For each: fibre type and product, country of origin, approximate wholesale price per metre or kg,
  certifications held (OEKO-TEX, GOTS, REACH compliance), and key customers.
  Cite sources.
