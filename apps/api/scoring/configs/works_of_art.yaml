competitor_query_template: >
  Who are the top 3-5 art, antiques, and collectibles exporters or galleries currently
  supplying {target_country} art dealers, auction houses, galleries, and collectors in 2025?
  Focus on suppliers from Balkans (Kosovo, Albania, Serbia — emerging contemporary art scenes),
  Eastern Europe (Poland, Czech Republic — established art markets), and established Western
  European galleries operating in this market.
  For each: art category (contemporary, antique, regional heritage), country of origin,
  approximate price range, provenance documentation standards, and key buyers.
  Cite sources.
