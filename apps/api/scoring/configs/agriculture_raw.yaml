competitor_query_template: >
  Who are the top 3-5 agricultural raw material exporters (cereals, oil seeds, animal feed,
  cut flowers) currently supplying {target_country} importers and processors in 2025?
  Focus on suppliers from Balkans, Eastern Europe, Ukraine, and Moldova.
  For each: product, country of origin, approximate price per tonne,
  certifications held (organic, phytosanitary), and buyers they supply.
  Cite sources.
