  CH: ["Getreide Grosshandel Schweiz", "Futtermittel Grosshandel"]

retail_to_wholesale_ratio: 0.60
typical_retailer_margin: 0.40

compliance_checks:
  - id: phytosanitary_certificate
    name: Phytosanitary Certificate (IPPC / EU Plant Health Regulation)
    type: mandatory
    critical: true
    cost_low_eur: 150
    cost_high_eur: 600
    lead_time_weeks_min: 1
    lead_time_weeks_max: 3
    providers:
      - "National Plant Protection Organisation (NPPO) in country of origin"
      - "Ministry of Agriculture phytosanitary inspectorate"
    note: "EU Regulation 2016/2031 — all plant products (cereals, seeds, cut flowers, plant material) require a phytosanitary certificate from the national NPPO. Must accompany every shipment. Pre-notification required via iMPORTal (EU entry management system). WB6 countries under SAA must comply with EU plant health rules."

  - id: mrl_compliance
    name: EU Maximum Residue Levels (MRL) — Pesticides & Contaminants
    type: mandatory
    critical: true
    cost_low_eur: 500
    cost_high_eur: 2000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 6
    providers:
      - "Accredited laboratory (ISO 17025): SGS, Eurofins, Intertek"
      - "National food safety laboratory"
    note: "EU Regulation 396/2005 — sets maximum residue levels for pesticides in food and feed. Samples must be tested by an EU-accredited laboratory before shipment. RASFF (Rapid Alert System for Food and Feed) rejections for MRL violations are common. Obtain test certificates per batch, particularly for cereals (aflatoxin), oil seeds, and dried fruits."

  - id: eu_organic_certification
    name: EU Organic Certification (Council Regulation EC 834/2007 / EU 2018/848)
    type: recommended
    critical: false
    cost_low_eur: 2000
    cost_high_eur: 6000
    lead_time_weeks_min: 12
    lead_time_weeks_max: 52
    providers:
      - "Ecocert: ecocert.com"
      - "Bureau Veritas Certification"
      - "KIWA BCS Öko-Garantie GmbH"
    note: "EU Regulation 2018/848 — organic produce commands 20-50% price premium in EU markets. Certification requires a 2-year conversion period plus annual audits. Balkans producers with access to uncertified organic land have significant competitive advantage. Highly recommended for cereals, oil seeds, and herbal materials."

  - id: animal_feed_registration
    name: EU Feed Business Operator Registration (HS 23 — Animal Feed)
    type: mandatory
    critical: true
    cost_low_eur: 300
    cost_high_eur: 1000
    lead_time_weeks_min: 4
    lead_time_weeks_max: 12
    providers:
      - "National competent authority in exporting country"
      - "EU feed establishment list: ec.europa.eu"
    note: "EU Regulation 183/2005 — feed business operators producing or exporting compound feed, feed ingredients, or additives to the EU must be registered/approved in their national competent authority and listed on the EU approved feed establishments list. Applies to HS chapter 23 (animal feed, oil-cake, bran). Non-listed establishments cannot export feed to EU."

  - id: traces_plant_health
    name: TRACES Plant Health Pre-Notification
    type: mandatory
    critical: false
    cost_low_eur: 100
    cost_high_eur: 300
    lead_time_weeks_min: 1
    lead_time_weeks_max: 1
    providers:
      - "EU importer registers via iMPORTal: importal.ec.europa.eu"
    note: "EU Regulation 2017/625 — plant products regulated under plant health rules require pre-notification before arrival at EU point of entry. The EU importer submits a Common Health Entry Document (CHED-PP) via iMPORTal at least 1 working day before arrival. Cut flowers require 4-hour pre-notification."

