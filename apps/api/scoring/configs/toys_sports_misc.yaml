competitor_query_template: >
  Who are the top 3-5 toy and sports equipment exporters currently supplying
  {target_country} toy retailers, sporting goods chains, and distributors in 2025?
  Focus on suppliers from Balkans, Eastern Europe (Poland, Czech Republic), Turkey, and
  established Asian suppliers with EU presence.
  For each: product category, country of origin, approximate wholesale price per unit,
  certifications held (EN 71, CE, OEKO-TEX for textiles), and key retail/wholesale customers.
  Cite sources.
