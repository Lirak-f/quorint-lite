competitor_query_template: >
  Who are the top 3-5 footwear and leather goods exporters currently supplying
  {target_country} shoe retailers, fashion wholesalers, and department stores in 2025?
  Focus on suppliers from Balkans (Kosovo, Albania, Bosnia), Eastern Europe (Romania, Bulgaria),
  Turkey, and Portugal.
  For each: product category, country of origin, approximate wholesale price per pair or unit,
  certifications held, and key buyers they supply.
  Cite sources.
