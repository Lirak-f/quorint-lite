sector_name: leather_footwear
hs_chapters: ["41", "42", "43", "64", "65", "66", "67"]

# Google Shopping queries per target country language
price_queries:
  DE: ["Schuhe Großhandel", "Lederartikel Großhandel Deutschland", "Handtaschen Großhandel"]
  AT: ["Schuhe Großhandel Österreich", "Lederwaren Großhandel Wien"]
  IT: ["calzature ingrosso", "pelletteria ingrosso", "borse ingrosso Italia"]
  FR: ["chaussures en gros grossiste", "maroquinerie grossiste France", "sacs grossiste"]
  NL: ["schoenen groothandel", "lederartikelen groothandel Nederland", "tassen groothandel"]
  CH: ["Schuhe Grosshandel Schweiz", "Lederwaren Grosshandel"]

retail_to_wholesale_ratio: 0.45
typical_retailer_margin: 0.55

compliance_checks:
  - id: reach_azo_dyes
    name: REACH Restriction on Azo Dyes & SVHC in Leather Articles
    type: mandatory
    critical: true
    cost_low_eur: 500
    cost_high_eur: 2000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 6
    providers:
      - "Eurofins Chemical Testing"
      - "SGS Consumer Testing Services"
      - "Intertek"
    note: "EU REACH Regulation Annex XVII, Entry 43 — certain azo dyes that can release carcinogenic aromatic amines are restricted in leather articles (including footwear uppers, clothing, accessories). Test report confirming absence of restricted azo dyes (EN ISO 17234-1) required. Also check SVHC candidate list substances in leather: chromium VI (EN ISO 17075), pentachlorophenol (PCP). Lab test cost per material type."

  - id: footwear_labelling
    name: EU Footwear Labelling Directive (94/11/EC)
    type: mandatory
    critical: false
    cost_low_eur: 200
    cost_high_eur: 800
    lead_time_weeks_min: 1
    lead_time_weeks_max: 4
    providers:
      - "Label printer with EU standard pictograms"
      - "Regulatory compliance consultant"
    note: "EU Directive 94/11/EC — all footwear sold in EU must be labelled with pictograms indicating the material composition of: upper, lining/sock, and outsole. Four material categories: leather, coated leather, textile, other. Labels must be affixed to each pair (on one shoe). No specific test required — manufacturer self-declaration. Pictogram set is standardised. Must appear on the product itself, not just packaging."

  - id: cites_exotic_leather
    name: CITES Permit — Exotic Skins & Fur (HS 41, 43)
    type: mandatory
    critical: false
    cost_low_eur: 300
    cost_high_eur: 1500
    lead_time_weeks_min: 4
    lead_time_weeks_max: 12
    providers:
      - "National CITES Management Authority in exporting country"
      - "EU CITES import permit: national wildlife authority"
    note: "Washington Convention (CITES) — applies to exotic leather (crocodile, python, ostrich, stingray — HS 41) and fur products (HS 43) from protected species. Appendix I species (CITES highest protection) are prohibited for commercial trade. Appendix II species require export and import permits. Common materials like bovine leather, sheepskin, pigskin are NOT CITES-controlled. Always verify species before sourcing."

  - id: real_fur_labelling
    name: EU Real Fur Labelling — Regulation EU 1007/2011
    type: mandatory
    critical: false
    cost_low_eur: 200
    cost_high_eur: 600
    lead_time_weeks_min: 1
    lead_time_weeks_max: 3
    providers:
      - "Label supplier"
    note: "EU Regulation 1007/2011 (Textile Labelling) Article 12a — products containing real animal fur must be labelled 'Contains real fur'. Applies to all textile and leather articles with incorporated fur trim. Fur species may be required on label in certain EU markets. Faux-fur products labelled as real fur or vice versa is an infringement subject to market surveillance action."

  - id: reach_pcp_restriction
    name: REACH Restriction on Pentachlorophenol (PCP) in Leather
    type: mandatory
    critical: false
    cost_low_eur: 300
    cost_high_eur: 1000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 4
    providers:
      - "Eurofins Leather Testing"
      - "SGS Consumer Testing"
    note: "EU REACH Regulation Annex XVII, Entry 22 — pentachlorophenol (PCP), used as leather preservative, is restricted to <5 mg/kg in leather articles. Test method EN 1010 or equivalent. Most modern tanneries have eliminated PCP, but traditional Balkan tanneries may still use it. Obtain test certificate per batch from accredited lab."

