competitor_query_template: >
  Who are the top 3-5 ceramic tile, natural stone, glass, and jewellery exporters currently
  supplying {target_country} construction distributors, tile retailers, and jewellery wholesalers
  in 2025?
  Focus on suppliers from Balkans (Kosovo, Albania, Serbia, Bosnia, North Macedonia),
  Turkey, Italy, and Spain.
  For each: product category, country of origin, approximate wholesale price per m² or unit,
  certifications held (CE marking, EN 14411, hallmarking), and key buyers.
  Cite sources.
