sector_name: food_beverage
hs_chapters: ["07", "08", "09", "15", "16", "17", "18", "19", "20", "21", "22"]

# Google Shopping queries per target country language
price_queries:
  DE: ["Olivenöl extra vergine Großhandel", "Speiseöl Großhandel Lebensmittel", "Bio Olivenöl Großhandel"]
  AT: ["Olivenöl Großhandel Österreich", "Lebensmittel Import Großhandel"]
  IT: ["olio d'oliva all'ingrosso", "alimenti ingrosso distributore", "olio extravergine ingrosso"]
  FR: ["huile d'olive grossiste", "alimentation grossiste France", "epicerie grossiste"]
  NL: ["olijfolie groothandel", "voeding groothandel Nederland"]
  CH: ["Olivenöl Grosshandel Schweiz", "Lebensmittel Import Grosshandel"]

retail_to_wholesale_ratio: 0.55
typical_retailer_margin: 0.30

compliance_checks:
  - id: haccp
    name: HACCP Food Safety Management System
    type: mandatory
    critical: true
    cost_low_eur: 1500
    cost_high_eur: 4000
    lead_time_weeks_min: 4
    lead_time_weeks_max: 12
    providers:
      - "SGS Food Safety: +49 40 30 10 30"
      - "Bureau Veritas Food: bureau-veritas.com"
      - "Lloyd's Register Food Assurance: lr.org"
    note: "EU Food Safety Regulation (EC) 852/2004 — HACCP is mandatory for all food producers exporting to the EU. Must be implemented and documented before first shipment."

  - id: traces_sps
    name: EU TRACES SPS Certificate (Sanitary & Phytosanitary)
    type: mandatory
    critical: false
    cost_low_eur: 200
    cost_high_eur: 1000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 6
    providers:
      - "National competent authority in origin country (e.g. Kosovo: MAFRD Ministry)"
      - "EU TRACES portal: traces.ec.europa.eu"
    note: "Issued by your country's food safety authority per export consignment. Required for plant-based food products entering the EU."

  - id: eu_organic
    name: EU Organic Certification (if marketing as organic)
    type: commercial_expected
    critical: false
    cost_low_eur: 1000
    cost_high_eur: 3500
    lead_time_weeks_min: 6
    lead_time_weeks_max: 24
    providers:
      - "Control Union Certifications: +31 50 525 28 35"
      - "Bureau Veritas Certification"
      - "BCS Öko-Garantie GmbH (Germany): +49 911 424390"
    note: "EU Organic Regulation (EU) 2018/848. Required only if claiming 'organic' on labelling. Significant premium: Austrian/German organic food imports command 40-80% price premium."

  - id: eu_food_labelling
    name: EU Food Information Regulation (FIR) Labelling Compliance
    type: mandatory
    critical: false
    cost_low_eur: 500
    cost_high_eur: 2000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 6
    providers:
      - "Food labelling consultant (local law firm or packaging specialist)"
      - "TÜV Rheinland product compliance"
    note: "EU Regulation 1169/2011 — label must be in the language of the target country (German for DE/AT, Italian for IT). Mandatory allergen listing, nutritional declaration, origin labelling."

  - id: novel_food
    name: Novel Food Authorisation (if applicable)
    type: mandatory
    critical: false
    cost_low_eur: 5000
    cost_high_eur: 50000
    lead_time_weeks_min: 52
    lead_time_weeks_max: 156
    providers:
      - "Regulatory consultant (required)"
      - "EFSA (European Food Safety Authority): efsa.europa.eu"
    note: "EU Novel Food Regulation (EU) 2015/2283 — only applies to foods not widely consumed in EU before May 1997 (e.g. insect protein, certain plant extracts). Most traditional Balkan food products are exempt."

