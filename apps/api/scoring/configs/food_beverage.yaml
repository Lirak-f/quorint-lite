competitor_query_template: >
  Who are the top 3-5 food and beverage wholesale suppliers currently
  exporting to {target_country} importers and distributors in 2025?
  Focus on olive oil, vegetable oils, preserved foods, and specialty food from
  Southern and Eastern Europe. For each: country of origin, approximate wholesale
  price range per unit/kg, certifications held (organic, HACCP), and which
  distributors they supply. Cite sources.
