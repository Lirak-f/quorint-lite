competitor_query_template: >
  Who are the top 3-5 meat, fish, and animal product exporters currently supplying
  {target_country} wholesale food distributors and retail chains in 2025?
  Focus on suppliers from Balkans (Kosovo, Albania, Serbia, Bosnia), Eastern Europe, and Turkey.
  For each: product category, country of origin, approximate wholesale price per kg,
  EU certifications held (HACCP, FBO approval number), and which buyers they supply.
  Cite sources.
