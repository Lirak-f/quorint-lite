competitor_query_template: >
  Who are the top 3-5 chemical and pharmaceutical raw material exporters currently
  supplying {target_country} distributors, manufacturers, and importers in 2025?
  Focus on suppliers from Balkans, Eastern Europe, India, and China with EU-established presence.
  For each: product category, country of origin, approximate price per kg or tonne,
  EU certifications (REACH registration, GMP, BPR status), and key EU customers.
  Cite sources.
