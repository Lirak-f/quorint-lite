competitor_query_template: >
  Who are the top 3-5 steel and metal product wholesale manufacturers/exporters
  currently supplying {target_country} steel distributors and service centres in 2025?
  Focus on suppliers from Eastern Europe, Ukraine, Turkey, and the Balkans.
  For each: country of origin, approximate wholesale price range per tonne,
  certifications held (EN 10204, ISO 9001, CE), and which distributors they supply.
  Cite sources.
