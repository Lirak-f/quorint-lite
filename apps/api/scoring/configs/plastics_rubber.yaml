competitor_query_template: >
  Who are the top 3-5 plastic and rubber product exporters currently supplying
  {target_country} manufacturers, distributors, and packaging companies in 2025?
  Focus on suppliers from Balkans, Eastern Europe, Turkey, and Central Europe.
  For each: product category (granules, profiles, technical parts, packaging),
  country of origin, approximate wholesale price per kg or tonne,
  certifications (REACH, RoHS, ISO 9001), and key customers.
  Cite sources.
