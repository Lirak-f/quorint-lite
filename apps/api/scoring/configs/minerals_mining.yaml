    country: DE
    city: Munich
    month: 4
    url: "https://www.bauma.de"
  - name: "SteinExpo Germany"
    country: DE
    city: Homberg
    month: 9
    url: "https://www.steinexpo.de"
  - name: "Mining & Minerals Industry Conference"
    country: AT
    city: Vienna
    month: 5
  - name: "Eurocoal Annual Conference"
    country: DE
    city: Dusseldorf
    month: 6
    url: "https://euracoal.eu"

typical_first_order_units: 50000
typical_compliance_cost_eur: 4000
sample_shipping_cost_eur: 1500

competitor_query_template: >
  Who are the top 3-5 mineral and mining product exporters (industrial minerals, stone,
  coal, petroleum products) currently supplying {target_country} industrial buyers
  and construction companies in 2025?
  Focus on suppliers from Balkans (Kosovo, Serbia, Bosnia, North Macedonia), Ukraine, Turkey.
  For each: product, country of origin, approximate price per tonne,
  certifications (ISO 9001, CLP/REACH status), and buyers they supply.
  Cite sources.
