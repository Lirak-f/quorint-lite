  person_titles:
    - "procurement"
    - "purchasing"
    - "einkauf"
    - "acquisti"
    - "achat"
    - "commodity trader"
    - "raw materials manager"
    - "supply chain"
    - "mineral buyer"
  company_keywords:
    - "Mineralienhandel"
    - "mineral wholesaler"
    - "mineral importer"
    - "Baustoffhandel"
    - "construction materials distributor"
    - "Rohstoffhandel"
    - "raw materials trader"
    - "fuel distributor"
    - "Kraftstoffhandel"
    - "coal trader"
    - "Kohlehandel"
    - "aggregate supplier"
    - "Gesteinskörnung"
    - "sand gravel supplier"
    - "minerali ingrosso"
  company_size_ranges: ["11-50", "51-200", "201-500", "501-1000"]

