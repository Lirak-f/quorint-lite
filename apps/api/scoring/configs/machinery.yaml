competitor_query_template: >
  Who are the top 3-5 industrial machinery and equipment wholesale manufacturers
  currently supplying {target_country} distributors and buyers in 2025?
  Focus on manufacturers from Eastern Europe, Turkey, and the Balkans for
  industrial machinery and electrical equipment.
  For each: country of origin, approximate wholesale price range per unit,
  certifications held (CE, ISO 9001), and which distributors they supply.
  Cite sources.
