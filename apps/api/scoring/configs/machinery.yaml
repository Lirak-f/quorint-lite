sector_name: machinery
hs_chapters: ["84", "85"]

# Google Shopping queries per target country language
price_queries:
  DE: ["Maschinen Großhandel", "Industriemaschinen Großhandel Deutschland", "elektrische Geräte Großhandel"]
  AT: ["Maschinen Großhandel Österreich", "Industrieausrüstung Großhandel"]
  IT: ["macchinari ingrosso", "macchine industriali all'ingrosso", "attrezzature ingrosso"]
  FR: ["machines grossiste", "équipements industriels grossiste France"]
  NL: ["machines groothandel", "industriële apparatuur groothandel"]
  CH: ["Maschinen Grosshandel Schweiz", "Industriemaschinen Grosshandel"]

retail_to_wholesale_ratio: 0.65
typical_retailer_margin: 0.25

compliance_checks:
  - id: ce_machinery
    name: CE Marking — Machinery Directive 2006/42/EC
    type: mandatory
    critical: true
    cost_low_eur: 3000
    cost_high_eur: 15000
    lead_time_weeks_min: 8
    lead_time_weeks_max: 26
    providers:
      - "TÜV SÜD Product Service: +49 89 5791 0"
      - "TÜV Rheinland: +49 221 806 0"
      - "Bureau Veritas Industrial: bureauveritas.com"
      - "DEKRA Industrial: +49 711 7861 0"
    note: "EU Machinery Directive 2006/42/EC (being replaced by Machinery Regulation (EU) 2023/1230 from 2027) — CE marking is mandatory for all machinery sold in the EU. Requires technical file, risk assessment, Declaration of Conformity. For complex machinery, notified body involvement is required."

  - id: emc_directive
    name: CE Marking — EMC Directive 2014/30/EU (electrical)
    type: mandatory
    critical: false
    cost_low_eur: 2000
    cost_high_eur: 8000
    lead_time_weeks_min: 6
    lead_time_weeks_max: 16
    providers:
      - "TÜV Rheinland: +49 221 806 0"
      - "SGS Electronics Germany: +49 40 30 10 30"
      - "Eurofins E&E Testing"
    note: "EU EMC Directive 2014/30/EU — required for electrical machinery and equipment. Tests electromagnetic compatibility. Often combined with LVD and Machinery Directive testing to reduce cost."

  - id: lvd_directive
    name: CE Marking — Low Voltage Directive 2014/35/EU
    type: mandatory
    critical: false
    cost_low_eur: 1500
    cost_high_eur: 6000
    lead_time_weeks_min: 4
    lead_time_weeks_max: 12
    providers:
      - "TÜV SÜD Product Service"
      - "Bureau Veritas Electronics"
      - "SGS Germany"
    note: "EU LVD Directive 2014/35/EU — required for electrical equipment operating at 50-1000V AC or 75-1500V DC. Applies to HS chapter 85 electrical machinery. Often tested alongside EMC."

  - id: iso_9001_machinery
    name: ISO 9001:2015 Quality Management
    type: commercial_expected
    critical: false
    cost_low_eur: 4000
    cost_high_eur: 10000
    lead_time_weeks_min: 16
    lead_time_weeks_max: 30
    providers:
      - "Bureau Veritas Germany: +49 40 3233 0"
      - "TÜV Austria: +43 1 514 07"
      - "SGS Austria: +43 1 522 27 67"
    note: "Required by most EU machinery distributors and OEM buyers as baseline quality assurance. Without ISO 9001, only spot-market / low-value deals are realistically available."

  - id: rohs_machinery
    name: RoHS 2 Directive Compliance (2011/65/EU)
    type: mandatory
    critical: false
    cost_low_eur: 800
    cost_high_eur: 3000
    lead_time_weeks_min: 2
    lead_time_weeks_max: 8
    providers:
      - "SGS RoHS Testing"
      - "Bureau Veritas Electronics"
      - "Eurofins Product Testing"
    note: "EU RoHS 2 Directive 2011/65/EU — restricts hazardous substances in electrical and electronic equipment. Requires testing and documentation. Applies to HS chapter 85 and electrical components in HS 84."

