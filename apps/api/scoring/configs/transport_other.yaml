competitor_query_template: >
  Who are the top 3-5 railway component, aerospace parts, and marine equipment exporters
  currently supplying {target_country} OEMs, rail operators, shipyards, and MRO companies
  in 2025?
  Focus on suppliers from Balkans, Eastern Europe (Czech Republic, Poland, Romania), and Turkey.
  For each: product category, country of origin, approximate price range,
  certifications held (TSI/NoBo, EASA, IMO, IRIS, ISO 9001), and key OEM customers.
  Cite sources.
